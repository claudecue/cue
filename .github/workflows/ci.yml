name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests (zero dependencies — no install step)
        run: node --test

  manifests:
    name: validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: plugin.json, marketplace.json, and hooks.json are valid JSON
        run: |
          node -e "['.claude-plugin/plugin.json','.claude-plugin/marketplace.json','hooks/hooks.json'].forEach(f=>{JSON.parse(require('fs').readFileSync(f,'utf8'));console.log('ok:',f)})"
